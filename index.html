<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultNote - Secure Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#1c1c1e',
                        darkSidebar: '#2c2c2e',
                        darkBorder: '#3a3a3c',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease;
        }

        .nv-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            height: calc(100vh - 40px);
            margin: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            border-width: 1px;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            border-right-width: 1px;
        }

        .notes-list {
            flex: 1;
            overflow-y: auto;
        }

        .note-item {
            padding: 12px 15px;
            border-bottom-width: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .editor-area {
            display: flex;
            flex-direction: column;
        }

        .note-content {
            flex: 1;
            border: none;
            outline: none;
            padding: 40px;
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            background: transparent;
        }

        .status-bar {
            padding: 8px 20px;
            font-size: 12px;
            border-top-width: 1px;
            display: flex;
            justify-content: space-between;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d2d2d7; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #48484a; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        /* Light Theme Defaults */
        body { background-color: #f5f5f7; color: #1d1d1f; }
        .nv-container { background: white; border-color: #d2d2d7; }
        .sidebar { background: #fbfbfd; border-color: #d2d2d7; }
        .note-item { border-color: #f2f2f7; }
        .note-item:hover { background: #f2f2f7; }
        .note-item.active { background: #0071e3; color: white; }
        .status-bar { background: #fbfbfd; border-color: #d2d2d7; color: #86868b; }
        .search-area { border-bottom: 1px solid #d2d2d7; }

        /* Dark Theme Overrides */
        .dark body { background-color: #000; color: #f5f5f7; }
        .dark .nv-container { background: #1c1c1e; border-color: #3a3a3c; }
        .dark .sidebar { background: #2c2c2e; border-color: #3a3a3c; }
        .dark .note-item { border-color: #3a3a3c; }
        .dark .note-item:hover { background: #3a3a3c; }
        .dark .note-item.active { background: #0a84ff; color: white; }
        .dark .status-bar { background: #2c2c2e; border-color: #3a3a3c; color: #98989d; }
        .dark .search-area { border-color: #3a3a3c; }
        .dark input, .dark textarea { color: #f5f5f7; }
    </style>
</head>
<body class="light">

    <!-- Setup Password Modal -->
    <div id="password-modal" class="modal-overlay">
        <div class="bg-white dark:bg-darkSidebar p-8 rounded-2xl shadow-2xl w-96 border border-gray-200 dark:border-darkBorder">
            <h2 class="text-xl font-semibold mb-2 dark:text-white">Access Key Required</h2>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">Enter your encryption password to unlock your notes.</p>
            <input type="password" id="master-password" class="w-full p-3 border border-gray-300 dark:border-darkBorder dark:bg-darkBg rounded-lg mb-4 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter password...">
            <button onclick="unlockApp()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-medium hover:bg-blue-700 transition">Unlock Vault</button>
        </div>
    </div>

    <div class="nv-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="search-area p-[15px] flex items-center gap-2">
                <input type="text" id="search-input" oninput="handleSearch()" class="flex-1 p-2 bg-white dark:bg-darkBg border border-gray-300 dark:border-darkBorder rounded-md shadow-sm focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="Search or Create...">
                <button onclick="toggleDarkMode()" class="p-2 rounded-md hover:bg-gray-200 dark:hover:bg-darkBorder transition-colors" title="Toggle Dark Mode">
                    <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 hidden dark:block text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                    <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 block dark:hidden text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
                    </svg>
                </button>
            </div>
            <div id="notes-list" class="notes-list"></div>
            <div class="p-3 border-t border-gray-200 dark:border-darkBorder flex justify-between items-center">
                <button onclick="lockApp()" class="text-[10px] text-red-500 hover:underline uppercase tracking-tighter">Lock Vault</button>
                <span class="text-[9px] text-gray-400 uppercase tracking-widest">v1.1</span>
            </div>
        </div>

        <!-- Editor -->
        <div class="editor-area">
            <div id="editor-placeholder" class="flex-1 flex flex-col items-center justify-center text-gray-400 p-10 text-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
                <p>Select a note or search to create one.</p>
            </div>
            <textarea id="note-editor" class="note-content hidden" oninput="saveCurrentNote()" placeholder="Start typing..."></textarea>
            
            <div class="status-bar">
                <div id="word-count">0 words</div>
                <div class="flex items-center gap-4">
                    <button id="delete-btn" onclick="deleteCurrentNote()" class="hidden text-red-500 hover:text-red-700 transition-colors flex items-center gap-1 cursor-pointer" title="Delete Note">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                        <span class="uppercase tracking-widest text-[9px]">Delete</span>
                    </button>
                    <div id="encryption-status" class="flex items-center gap-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                        <span class="opacity-70">End-to-End Encrypted</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Core State ---
        let notes = []; 
        let currentNoteId = null;
        let masterKey = null; 
        const APP_ID = 'vaultnote_v1';

        // --- Dark Mode Logic ---
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('vaultnote_theme', isDark ? 'dark' : 'light');
        }

        // Initialize theme from storage
        if (localStorage.getItem('vaultnote_theme') === 'dark' || 
            (!localStorage.getItem('vaultnote_theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        // --- Custom Encryption Logic ---
        async function deriveKey(password, salt) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password + salt);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            return new Uint8Array(hashBuffer);
        }

        function customXOR(text, key) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const result = new Uint8Array(data.length);
            for (let i = 0; i < data.length; i++) {
                result[i] = data[i] ^ key[i % key.length];
            }
            return btoa(String.fromCharCode.apply(null, result));
        }

        function customXORDecrypt(base64Data, key) {
            try {
                const binaryString = atob(base64Data);
                const data = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    data[i] = binaryString.charCodeAt(i);
                }
                const result = new Uint8Array(data.length);
                for (let i = 0; i < data.length; i++) {
                    result[i] = data[i] ^ key[i % key.length];
                }
                return new TextDecoder().decode(result);
            } catch (e) {
                return "[Decryption Error]";
            }
        }

        // --- App Logic ---
        async function loadFromDisk() {
            const stored = localStorage.getItem(APP_ID);
            const diskNotes = stored ? JSON.parse(stored) : [];
            notes = [];
            
            for (const dNote of diskNotes) {
                const key = await deriveKey(masterKey, dNote.salt);
                let decryptedTitle = dNote.title;
                
                // Decrypt title if it has the ENC: prefix
                if (dNote.title && dNote.title.startsWith("ENC:")) {
                    decryptedTitle = customXORDecrypt(dNote.title.substring(4), key);
                }
                
                notes.push({
                    ...dNote,
                    title: decryptedTitle
                });
            }
            
            // Auto-migrate old unencrypted notes on load
            if (diskNotes.some(n => !n.title.startsWith("ENC:"))) {
                await saveToDisk();
            }
            
            renderNotesList();
        }

        async function saveToDisk() {
            if (!masterKey) return;
            const diskNotes = [];
            for (const note of notes) {
                const key = await deriveKey(masterKey, note.salt);
                diskNotes.push({
                    ...note,
                    title: "ENC:" + customXOR(note.title, key)
                });
            }
            localStorage.setItem(APP_ID, JSON.stringify(diskNotes));
        }

        async function unlockApp() {
            const pass = document.getElementById('master-password').value;
            if (!pass) return;
            masterKey = pass; 
            document.getElementById('password-modal').classList.add('hidden');
            await loadFromDisk();
        }

        function lockApp() {
            masterKey = null;
            currentNoteId = null;
            document.getElementById('password-modal').classList.remove('hidden');
            document.getElementById('master-password').value = '';
            document.getElementById('note-editor').classList.add('hidden');
            document.getElementById('editor-placeholder').classList.remove('hidden');
            document.getElementById('delete-btn').classList.add('hidden');
        }

        async function createNote(title) {
            const salt = Math.random().toString(36).substring(2, 15);
            const key = await deriveKey(masterKey, salt);
            const newNote = {
                id: Date.now().toString(),
                title: title,
                content: customXOR("", key),
                salt: salt,
                updated: Date.now()
            };
            notes.unshift(newNote);
            await saveToDisk();
            selectNote(newNote.id);
            document.getElementById('search-input').value = '';
            renderNotesList();
        }

        async function selectNote(id) {
            currentNoteId = id;
            const note = notes.find(n => n.id === id);
            const editor = document.getElementById('note-editor');
            const placeholder = document.getElementById('editor-placeholder');
            
            if (note) {
                placeholder.classList.add('hidden');
                editor.classList.remove('hidden');
                document.getElementById('delete-btn').classList.remove('hidden');
                const key = await deriveKey(masterKey, note.salt);
                editor.value = customXORDecrypt(note.content, key);
                updateWordCount(editor.value);
                renderNotesList();
                editor.focus();
            }
        }

        async function saveCurrentNote() {
            if (!currentNoteId) return;
            const noteIndex = notes.findIndex(n => n.id === currentNoteId);
            const content = document.getElementById('note-editor').value;
            const key = await deriveKey(masterKey, notes[noteIndex].salt);
            notes[noteIndex].content = customXOR(content, key);
            notes[noteIndex].updated = Date.now();
            updateWordCount(content);
            await saveToDisk();
        }

        async function deleteCurrentNote() {
            if (!currentNoteId) return;
            if (confirm("Are you sure you want to permanently delete this note?")) {
                notes = notes.filter(n => n.id !== currentNoteId);
                currentNoteId = null;
                await saveToDisk();
                
                document.getElementById('note-editor').classList.add('hidden');
                document.getElementById('editor-placeholder').classList.remove('hidden');
                document.getElementById('delete-btn').classList.add('hidden');
                document.getElementById('note-editor').value = '';
                updateWordCount("");
                renderNotesList();
            }
        }

        function handleSearch() {
            const query = document.getElementById('search-input').value.toLowerCase();
            renderNotesList(query);
            document.getElementById('search-input').onkeydown = (e) => {
                if (e.key === 'Enter' && query.trim() !== "") {
                    const exactMatch = notes.find(n => n.title.toLowerCase() === query);
                    if (!exactMatch) {
                        createNote(document.getElementById('search-input').value);
                    } else {
                        selectNote(exactMatch.id);
                    }
                }
            };
        }

        function renderNotesList(filter = "") {
            const listContainer = document.getElementById('notes-list');
            listContainer.innerHTML = '';
            const filtered = notes
                .filter(n => n.title.toLowerCase().includes(filter))
                .sort((a, b) => b.updated - a.updated);

            filtered.forEach(note => {
                const item = document.createElement('div');
                item.className = `note-item ${note.id === currentNoteId ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="font-semibold truncate text-xs uppercase tracking-wide">${note.title}</div>
                    <div class="text-[9px] opacity-60 mt-1">${new Date(note.updated).toLocaleDateString()}</div>
                `;
                item.onclick = () => selectNote(note.id);
                listContainer.appendChild(item);
            });
        }

        function updateWordCount(text) {
            const count = text.trim() ? text.trim().split(/\s+/).length : 0;
            document.getElementById('word-count').innerText = `${count} words`;
        }

        window.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'l') {
                e.preventDefault();
                document.getElementById('search-input').focus();
            }
        });

        // Focus password field on load
        window.onload = () => document.getElementById('master-password').focus();
    </script>
</body>
</html>
